<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generátor realitního inzerátu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Generátor realitního&nbsp;inzerátu</h1>
      <p>Vyplňte parametry nemovitosti a získejte automaticky vygenerovaný inzerát.</p>
    </header>
    <main class="content">
      <form id="listingForm">
        <div class="form-row">
          <label for="offerType">Typ nabídky</label>
          <select id="offerType">
            <option value="Prodej">Prodej</option>
            <option value="Pronájem">Pronájem</option>
          </select>
        </div>
        <div class="form-row">
          <label for="propertyType">Typ nemovitosti</label>
          <select id="propertyType">
            <option value="rodinný dům">Rodinný dům</option>
            <option value="dvojdům">Dvojdům</option>
            <option value="řadový dům">Řadový dům</option>
          </select>
        </div>
        <div class="form-row">
          <label for="dispozice">Dispozice (např. 5+kk)</label>
          <input type="text" id="dispozice" placeholder="5+kk" />
        </div>
        <div class="form-row">
          <label for="areaHouse">Užitná plocha domu (m²)</label>
          <input type="number" id="areaHouse" min="0" step="1" placeholder="115" />
        </div>
        <div class="form-row">
          <label for="areaPlot">Plocha pozemku (m²)</label>
          <input type="number" id="areaPlot" min="0" step="1" placeholder="500" />
        </div>
        <div class="form-row">
          <label for="location">Lokalita / Obec</label>
          <input type="text" id="location" placeholder="Staré Hodějovice / Srubec" />
        </div>
        <div class="form-row">
          <label for="price">Cena (Kč)</label>
          <input type="number" id="price" min="0" step="1000" placeholder="0" />
        </div>
        <div class="form-row">
          <label for="floors">Počet podlaží</label>
          <input type="number" id="floors" min="1" max="5" step="1" value="2" />
        </div>
        <div class="form-row">
          <label for="gardenOrientation">Orientace zahrady</label>
          <select id="gardenOrientation" multiple>
            <option value="sever">Sever</option>
            <option value="jih">Jih</option>
            <option value="východ">Východ</option>
            <option value="západ">Západ</option>
          </select>
        </div>
        <div class="form-row">
          <label for="tech">Technologie / Vybavení (stručně)</label>
          <textarea id="tech" rows="3" placeholder="Tepelné čerpadlo, podlahové vytápění, fotovoltaika..."></textarea>
        </div>
        <div class="form-row">
          <button type="button" id="generateBtn">Generovat inzerát</button>
        </div>
      </form>
      <section id="outputSection" class="output-section">
        <h2>Vygenerovaný inzerát</h2>
        <pre id="listingOutput"></pre>
      </section>
    </main>
    <footer>
      <p>Demo generátoru realitního inzerátu. Navrženo pro zobrazení na mobilu i desktopu.</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
